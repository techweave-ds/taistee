<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Chatbot</title>

<style>
body {
  font-family: 'Inter', sans-serif;
}

/* Floating Button */
#chat-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #4B2E83, #6d4bd1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  z-index: 10000;
  transition: 0.3s;
}

#chat-toggle:hover {
  transform: scale(1.08);
}

#chat-toggle img {
  width: 60%;
  height: 60%;
}

/* Chatbox */
#chatbox {
  position: fixed;
  bottom: 95px;
  right: 20px;
  width: 370px;
  height: 540px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  pointer-events: none;
  transition: 0.35s ease;
}

#chatbox.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

/* Header */
.chat-header {
  background: linear-gradient(135deg, #4B2E83, #6d4bd1);
  color: white;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
}

.header-logo {
  width: 30px;
  height: 30px;
}

/* Chat Body */
.chat-body {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f7f7f7;
}

/* Messages */
.chat-msg {
  display: flex;
  align-items: flex-end;
  margin-bottom: 12px;
}

.user {
  justify-content: flex-end;
}

.bot {
  justify-content: flex-start;
}

.bubble {
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 75%;
  font-size: 14px;
}

.user .bubble {
  background: #4B2E83;
  color: white;
}

.bot .bubble {
  background: #eaeaea;
}

/* Avatar */
.bot-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  margin-right: 6px;
}

/* Input */
.chat-input {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #eee;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

.chat-input button {
  margin-left: 8px;
  padding: 10px 14px;
  background: #4B2E83;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* Typing */
.typing {
  display: flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: gray;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2){ animation-delay: 0.2s; }
.dot:nth-child(3){ animation-delay: 0.4s; }

@keyframes blink {
  0%,80%,100%{opacity:0.2;}
  40%{opacity:1;}
}
</style>
</head>

<body>

<div id="chat-root"></div>

<script>
const LOGO_URL = "https://your-logo-url.png";
const API_URL = "https://1yoi29y563.execute-api.ap-south-1.amazonaws.com/chat";

let chatOpen = false;

function initChat() {
  const root = document.getElementById("chat-root");

  root.innerHTML = `
    <div id="chat-toggle">
      <img src="${LOGO_URL}" />
    </div>

    <div id="chatbox">
      <div class="chat-header">
        <img src="${LOGO_URL}" class="header-logo"/>
        Wakefit Support
      </div>

      <div class="chat-body" id="chat-body"></div>

      <div class="chat-input">
        <input id="chat-input" placeholder="Ask anything..." />
        <button id="send-btn">➤</button>
      </div>
    </div>
  `;

  const toggleBtn = document.getElementById("chat-toggle");
  const chatbox = document.getElementById("chatbox");

  toggleBtn.addEventListener("click", () => {
    chatOpen = !chatOpen;
    chatbox.classList.toggle("open");
  });

  document.getElementById("send-btn").addEventListener("click", sendMessage);

  document.getElementById("chat-input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  setTimeout(() => {
    chatbox.classList.add("open");
    chatOpen = true;
  }, 500);

  setTimeout(() => {
    appendMessage("Hi 👋 I’m Wakefit assistant. How can I help you today?", "bot");
  }, 900);
}

function appendMessage(text, type) {
  const body = document.getElementById("chat-body");

  const msg = document.createElement("div");
  msg.className = `chat-msg ${type}`;

  if (type === "bot") {
    msg.innerHTML = `
      <img src="${LOGO_URL}" class="bot-avatar"/>
      <div class="bubble">${text}</div>
    `;
  } else {
    msg.innerHTML = `<div class="bubble">${text}</div>`;
  }

  body.appendChild(msg);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  const body = document.getElementById("chat-body");

  const typing = document.createElement("div");
  typing.id = "typing";
  typing.className = "chat-msg bot";

  typing.innerHTML = `
    <img src="${LOGO_URL}" class="bot-avatar"/>
    <div class="bubble typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  body.appendChild(typing);
}

function removeTyping() {
  document.getElementById("typing")?.remove();
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();

  if (!text) return;

  appendMessage(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    removeTyping();
    typeMessage(data.reply);

  } catch (err) {
    removeTyping();
    typeMessage("⚠️ Server error. Try again.");
  }
}

function typeMessage(text) {
  const body = document.getElementById("chat-body");

  const msg = document.createElement("div");
  msg.className = "chat-msg bot";

  const avatar = document.createElement("img");
  avatar.src = LOGO_URL;
  avatar.className = "bot-avatar";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  body.appendChild(msg);

  let i = 0;
  const interval = setInterval(() => {
    bubble.innerText += text[i];
    i++;
    body.scrollTop = body.scrollHeight;

    if (i >= text.length) clearInterval(interval);
  }, 12);
}

window.onload = initChat;
</script>

</body>
</html>
